name: Trigger GitLab Pipeline

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger GitLab pipeline
        run: |
          curl -X POST \
          --fail \
          -F token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
          -F ref=main \
          https://gitlab.com/api/v4/projects/81861536/trigger/pipeline